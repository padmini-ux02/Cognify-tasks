<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application | Cognifyz Internship</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #0ea5e9;
            --dark: #0f172a;
            --darker: #020617;
            --gradient: linear-gradient(135deg, #4f46e5 0%, #0ea5e9 100%);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body {
            background-color: var(--darker); color: #fff; min-height: 100vh;
            display: flex; padding: 60px 20px; justify-content: center;
            background-image: radial-gradient(circle at 85% 100%, rgba(14, 165, 233, 0.15) 0%, transparent 50%);
        }
        .app-container {
            background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px;
            width: 100%; max-width: 600px; padding: 50px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .header { text-align: center; margin-bottom: 40px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 30px; }
        .header h1 { font-size: 2rem; margin-bottom: 10px; }
        .header p { color: #94a3b8; font-size: 1rem; line-height: 1.6; }
        
        .form-group { margin-bottom: 24px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; color: #e2e8f0; font-size: 0.95rem; }
        input, textarea, select {
            width: 100%; padding: 14px; background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            color: white; font-size: 1rem; outline: none; transition: 0.3s;
        }
        input:focus, textarea:focus, select:focus { border-color: var(--primary); background: rgba(255,255,255,0.08); }
        textarea { resize: vertical; min-height: 120px; }
        
        .btn-submit {
            width: 100%; padding: 16px; background: var(--gradient); border: none; border-radius: 12px;
            color: white; font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3); margin-top: 20px;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(79, 70, 229, 0.4); }
        
        .back-btn { position: absolute; top: 30px; left: 30px; color: #94a3b8; text-decoration: none; display: flex; align-items: center; gap: 8px; font-weight: 500; transition: 0.3s; }
        .back-btn:hover { color: white; }
    </style>
</head>
<body>
    <a href="Task 2.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Home</a>

    <div class="app-container">
        <div class="header">
            <h1>Start Your Journey</h1>
            <p>Join the upcoming internship cohort. Fill out your technical details accurately.</p>
        </div>

        <form onsubmit="event.preventDefault(); alert('Application Submitted Successfully!'); window.location.href='Task 2.html';">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="John Doe" required>
            </div>
            
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="john@domain.com" required>
            </div>

            <div class="form-group">
                <label>GitHub Profile URL</label>
                <input type="url" placeholder="https://github.com/johndoe" required>
            </div>

            <div class="form-group">
                <label>Select Role Interest</label>
                <select required style="color: #94a3b8;">
                    <option value="" disabled selected>Choose a track...</option>
                    <option value="frontend">Frontend Engineering</option>
                    <option value="backend">Backend Engineering</option>
                    <option value="fullstack">Full-Stack Development</option>
                </select>
            </div>

            <div class="form-group">
                <label>Why do you want to join Cognifyz?</label>
                <textarea placeholder="Tell us about your technical goals and what you hope to learn..." required></textarea>
            </div>

            <button type="submit" class="btn-submit">Execute Application Submission <i class="fa-solid fa-paper-plane ms-2"></i></button>
            <p style="text-align: center; margin-top: 20px; font-size: 0.9rem; color: #94a3b8;">Already applied? <a href="Login.html" style="color: var(--secondary); text-decoration: none;">Check Status</a></p>
        </form>
    </div>
</body>
</html>
